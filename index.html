<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>TikTok</title>
    <meta name="description" content="Make Your Day">
    <meta name="author" content="TikTok" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TikTok" />
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="/tiktok-logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/tiktok-logo.png" />
    <meta name="theme-color" content="#000000" />
    <meta property="og:title" content="TikTok">
    <meta property="og:type" content="website" />
    <meta property="og:description" content="Make Your Day">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TikTok">
    <meta name="twitter:description" content="Make Your Day">
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme') || 'dark';
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
          if (!localStorage.getItem('theme')) {
            localStorage.setItem('theme', 'dark');
          }
        } catch (e) {}

        // Aggressively prevent native pull-to-refresh
        document.addEventListener('touchstart', function(e) {
          this.startY = e.touches[0].pageY;
        }, { passive: true });

        document.addEventListener('touchmove', function(e) {
          const y = e.touches[0].pageY;
          // If at top and pulling down
          if (window.scrollY <= 0 && y > this.startY) {
            e.preventDefault();
          }
        }, { passive: false });
      })();
      
      // Security measures: Disable right-click, F12, Ctrl+Shift+I/J, Ctrl+U
      document.addEventListener('contextmenu', event => event.preventDefault());
      document.addEventListener('keydown', function(e) {
          // F12
          if(e.code === 'F12' || e.keyCode === 123) {
              e.preventDefault();
              return false;
          }
          // Ctrl+Shift+I (Chrome/Edge/Firefox)
          if(e.ctrlKey && e.shiftKey && (e.code === 'KeyI' || e.keyCode === 73)) {
              e.preventDefault();
              return false;
          }
          // Ctrl+Shift+J (Chrome/Edge Console)
          if(e.ctrlKey && e.shiftKey && (e.code === 'KeyJ' || e.keyCode === 74)) {
              e.preventDefault();
              return false;
          }
          // Ctrl+Shift+C (Chrome/Edge Inspect Element)
          if(e.ctrlKey && e.shiftKey && (e.code === 'KeyC' || e.keyCode === 67)) {
              e.preventDefault();
              return false;
          }
          // Ctrl+U (View Source)
          if(e.ctrlKey && (e.code === 'KeyU' || e.keyCode === 85)) {
              e.preventDefault();
              return false;
          }
      });

      // Anti-debug trick: create a debug loop to freeze dev tools if opened
      setInterval(function() {
          const before = new Date().getTime();
          debugger;
          const after = new Date().getTime();
          if (after - before > 100) {
              document.body.innerHTML = "Access Denied";
          }
      }, 1000);

    </script>
    <style>
      html, body {
        overscroll-behavior-y: none !important;
        touch-action: pan-x pan-y;
      }
    </style>
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
